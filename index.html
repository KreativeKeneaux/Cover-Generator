<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kreative Keneaux - Cover Generator</title>
  <style>
    body {
      background: #000;
      font-family: Arial, sans-serif;
      color: #fff;
      padding: 20px;
      margin: 0;
    }

    .container {
      max-width: 1100px;
      margin: auto;
    }

    h1 {
      text-align: center;
      color: #ff4da6;
      margin-bottom: 8px;
    }

    .brand {
      text-align: center;
      font-size: 14px;
      color: #ffcc00;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    select {
      width: 100%;
      min-height: 120px;
      padding: 8px;
      background: #111;
      color: #fff;
      border: 1px solid #ff4da6;
      border-radius: 5px;
    }

    textarea {
      width: 100%;
      height: 160px;
      margin-top: 20px;
      background: #111;
      color: #fff;
      border: 2px solid #ff4da6;
      padding: 10px;
      border-radius: 5px;
      box-sizing: border-box;
      resize: vertical;
    }

    .buttons {
      margin-top: 15px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 16px;
      border: none;
      background: #ff4da6;
      color: #fff;
      cursor: pointer;
      border-radius: 5px;
      font-weight: bold;
    }

    button:hover {
      background: #ff1a8c;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Cover Art Generator</h1>
    <div class="brand">Kreative Keneaux</div>

    <div class="grid" id="dropdowns"></div>

    <textarea id="output" placeholder="Your generated prompt will appear here..."></textarea>

    <div class="buttons">
      <button onclick="generatePrompt()">Generate</button>
      <button onclick="randomize()">Random</button>
      <button onclick="copyPrompt()">Copy</button>
      <button onclick="resetAll()">Reset</button>
    </div>
  </div>

  <script>
    const options = [
      ["None","Chibi","Realistic","Bratz Style","Cartoon","Editorial"],
      ["None","Black Woman","Teen Girl","Kid","Business Woman","Student"],
      ["None","Glossy Skin","Matte Skin","Glow Effect","Soft Blend"],
      ["None","Big Eyes","Natural Eyes","Lashes Heavy","Soft Glam"],
      ["None","Pink Glasses","Gold Jewelry","Headwrap","Butterflies"],
      ["None","Braids","Bun","Curly Hair","Straight Hair","Edges Styled"],
      ["None","Smiling","Serious","Confident","Side Eye"],
      ["None","Holding Book","Phone","Notebook","Coffee","Wine Glass"],
      ["None","Notebook Cover","Planner Cover","Journal Cover","Workbook"],
      ["None","School Theme","Boss Theme","Self Love Theme","Luxury"],
      ["None","Pink Background","Black Background","White Background"],
      ["None","90s Style","Modern","Tumblr Aesthetic","Luxury Editorial"],
      ["None","Neon Text","Script Font","Bold Font","3D Letters"],
      ["None","Quotes","Affirmations","Subject Label","Name Title"],
      ["None","English","Math","Science","Business","Self Love"],
      ["None","Butterflies","Hearts","Sparkles","Glitter"],
      ["None","Notebook Texture","Glossy Cover","Matte Cover"],
      ["None","Close Up Face","Half Body","Full Body"],
      ["None","Centered","Left Layout","Collage Layout"],
      ["None","Pink & Black","Pink & Yellow","Black & Gold"],
      ["None","Lighting Glow","Soft Lighting","Studio Lighting"],
      ["None","Girly","Bossy","Cute","Luxury"],
      ["None","Torn Paper Effect","Sticker Effect","Frame Border"],
      ["None","Accessories Heavy","Minimal Accessories"],
      ["None","Text Heavy","Image Focused"],
      ["None","High Detail","Soft Detail"],
      ["None","Background Patterns","Plain Background"],
      ["None","Editorial Poster","Notebook Style","Social Media Cover"],
      ["None","Motivational","Educational","Aesthetic"],
      ["None","High Gloss","Matte Finish","3D Shine"]
    ];

    const dropdownContainer = document.getElementById("dropdowns");

    options.forEach((group) => {
      const select = document.createElement("select");
      select.multiple = true;

      group.forEach((opt) => {
        const option = document.createElement("option");
        option.value = opt;
        option.textContent = opt;
        select.appendChild(option);
      });

      dropdownContainer.appendChild(select);
    });

    function generatePrompt() {
      const selects = document.querySelectorAll("select");
      let values = [];

      selects.forEach((s) => {
        const selected = Array.from(s.selectedOptions)
          .map((o) => o.value)
          .filter((v) => v !== "None");
        values.push(...selected);
      });

      const prompt = values.length
        ? `High quality printable cover design featuring ${values.join(", ")}, highly detailed, clean layout, bold composition, modern aesthetic, designed for digital product covers.`
        : "High quality printable cover design, highly detailed, clean layout, bold composition, modern aesthetic, designed for digital product covers.";

      document.getElementById("output").value = prompt;
    }

    function randomize() {
      const selects = document.querySelectorAll("select");

      selects.forEach((s) => {
        Array.from(s.options).forEach((option) => {
          option.selected = false;
        });

        const rand = Math.floor(Math.random() * s.options.length);
        s.options[rand].selected = true;
      });

      generatePrompt();
    }

    function copyPrompt() {
      const text = document.getElementById("output");
      text.select();
      text.setSelectionRange(0, 99999);
      document.execCommand("copy");
      alert("Copied!");
    }

    function resetAll() {
      const selects = document.querySelectorAll("select");

      selects.forEach((s) => {
        Array.from(s.options).forEach((option) => {
          option.selected = false;
        });
      });

      document.getElementById("output").value = "";
    }
  </script>
</body>
</html>
